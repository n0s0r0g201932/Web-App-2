<!DOCTYPE html>

<body>
    <!-- Иконка человечка -->

    <div class="btn-block">

        <p id="second-txt-btn-block">Не хочешь? <br> А может тогда....?</p>
        <a href="#" onclick="openPost('https://t.me/FreeChanelTest/7')">Новости</a>
        <a href="#" onclick="openPost('https://t.me/FreeChanelTest/8')">Контент</a>
        <a href="#" onclick="openPost('https://t.me/FreeChanelTest/9')">Новые скидки</a>

    <div class="block-1"></div>
    <div class="block-2"></div>
    <div class="block-3"></div>
    <div class="block-4"></div>
